<!DOCTYPE html>
<html>
<head>
    <title>JobSafe AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
        }
        #loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h1 class="text-center">JobSafe AI</h1>

    <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

        <textarea name="job_description" class="form-control mb-3" rows="6"
        placeholder="Paste job description"></textarea>

        <input type="file" name="image" class="form-control mb-3">

        <button class="btn btn-primary w-100">Analyze</button>

    </form>

    <div id="loader">
        <div class="spinner-border text-light"></div>
        <p>Analyzing...</p>
    </div>

    {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
    {% endif %}

</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
